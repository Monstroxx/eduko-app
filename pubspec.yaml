name: eduko
description: Modern open-source school management app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Local Database (offline-first)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Auth
  flutter_secure_storage: ^9.2.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  equatable: ^2.0.7
  path_provider: ^2.1.5
  path: ^1.9.0
  file_picker: ^8.1.6
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1
  pdf: ^3.11.2
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.2
  freezed: ^2.5.8
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.1.6
  drift_dev: ^2.22.1
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
    - assets/images/

  fonts: []
